<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Điểm danh Thực tập</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9; }
        
        /* Giao diện Đăng nhập & Thông tin User */
        #login-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        #main-app { display: none; } 
        .user-info { margin-bottom: 20px; font-weight: bold; color: #4CAF50; display: none; background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; max-width: 400px; margin: 0 auto 20px;}
        .btn-logout { margin-top: 10px; padding: 6px 12px; font-size: 14px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Chuyển tab Điểm danh / Đăng ký lịch */
        .tab-menu { display: flex; justify-content: center; margin-bottom: 20px; background: #ddd; border-radius: 8px; overflow: hidden; max-width: 400px; margin: 0 auto 20px; }
        .tab-btn { flex: 1; padding: 12px; font-weight: bold; border: none; cursor: pointer; background: transparent; transition: 0.3s; }
        .tab-btn.active { background: #4CAF50; color: white; }

        /* Camera & Elements */
        #camera-stream, #preview-canvas { width: 100%; max-width: 400px; border-radius: 8px; border: 2px solid #ccc; margin: 10px auto; display: none; }
        select, button, input[type="text"] { margin-top: 10px; padding: 12px; font-size: 16px; width: 100%; max-width: 300px; border-radius: 6px; border: 1px solid #aaa; box-sizing: border-box;}
        
        .btn-primary { background-color: #4CAF50; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-action { background-color: #008CBA; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-secondary { background-color: #ff9800; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-warning { background-color: #f44336; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        #active-camera-controls, #review-controls { display: none; margin-top: 10px; }
        #active-camera-controls button, #review-controls button { width: 48%; display: inline-block; margin: 0 1%; }

        /* UI Đăng ký lịch */
        #schedule-panel { display: none; max-width: 350px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .days-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; text-align: left; }
        .day-item { display: flex; align-items: center; background: #f1f1f1; padding: 10px; border-radius: 5px; cursor: pointer; }
        .day-item input { width: 20px; height: 20px; margin-right: 10px; }
        
        /* Thanh tiến trình */
        #progress-container { width: 100%; max-width: 300px; margin: 15px auto; background-color: #ddd; border-radius: 13px; display: none; }
        #progress-bar { width: 0%; height: 20px; background-color: #4CAF50; border-radius: 13px; transition: width 0.4s ease; }
        #loading-text { font-size: 14px; font-weight: bold; color: #333; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div id="login-panel">
        <h2 style="color: #4CAF50;">Hệ thống Quản lý Thực tập</h2>
        <p>Vui lòng đăng nhập bằng Gmail của bạn</p>
        
        <div id="g_id_onload"
             data-client_id="659967368152-b0lh488eled9lob2gfolerqe8k5eq0u7.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with"></div>
    </div>

    <div id="user-info" class="user-info">
        👤 Tài khoản: <span id="user-email" style="color:#000;"></span><br>
        <button class="btn-logout" onclick="logoutGoogle()">🚪 Đăng xuất</button>
    </div>

    <div id="main-app">
        
        <div class="tab-menu">
            <button id="tab-checkin" class="tab-btn active" onclick="switchTab('checkin')">📍 Điểm danh</button>
            <button id="tab-schedule" class="tab-btn" onclick="switchTab('schedule')">🗓️ Đăng ký lịch</button>
        </div>

        <select id="hoTen">
            <option value="">-- Chọn tên của bạn --</option>
            <option value="Lê Nguyễn Ngọc Yến">Lê Nguyễn Ngọc Yến</option>
            <option value="Võ Thị Ngọc Huyền">Võ Thị Ngọc Huyền</option>
            <option value="Ngô Nhật Hào">Ngô Nhật Hào</option>
            <option value="Nguyễn Như Ngọc">Nguyễn Như Ngọc</option>
            <option value="Nguyễn Quốc Thái">Nguyễn Quốc Thái</option>
            <option value="Lê Thị Thu Nguyệt">Lê Thị Thu Nguyệt</option>
            <option value="Phạm Văn Đăng">Phạm Văn Đăng</option>
            <option value="Bùi Thị Hồng Dung">Bùi Thị Hồng Dung</option>
            <option value="Ngô Trần Duy Khang">Ngô Trần Duy Khang</option>
            <option value="Phạm Như Quỳnh">Phạm Như Quỳnh</option>
            <option value="Mai Hữu Thiện">Mai Hữu Thiện</option>
            <option value="Phan Huỳnh Công Danh">Phan Huỳnh Công Danh</option>
            <option value="Lê Huỳnh Giao">Lê Huỳnh Giao</option>
            <option value="Dương Khai Kiệt">Dương Khai Kiệt</option>
            <option value="Võ Nguyễn Đạt Sơn">Võ Nguyễn Đạt Sơn</option>
            <option value="Nguyễn Khánh Duy">Nguyễn Khánh Duy</option>
            <option value="Ngô Gia Hân">Ngô Gia Hân</option>
            <option value="Nguyễn Võ Hoàng Phúc">Nguyễn Võ Hoàng Phúc</option>
            <option value="Lê Quốc Việt">Lê Quốc Việt</option>
            <option value="Tăng Khánh Vân">Tăng Khánh Vân</option>
            <option value="Nguyễn Hoàng Bảo Duy">Nguyễn Hoàng Bảo Duy</option>
            <option value="Võ Nguyễn Minh Thư">Võ Nguyễn Minh Thư</option>
            <option value="Nguyễn Thị Ngọc Trinh">Nguyễn Thị Ngọc Trinh</option>
            <option value="Lương Thị Huỳnh Trâm">Lương Thị Huỳnh Trâm</option>
            <option value="Trịnh Gia Hiếu">Trịnh Gia Hiếu</option>
            <option value="Huỳnh Lê Kim Ngân">Huỳnh Lê Kim Ngân</option>
            <option value="Thái Thanh Nhanh">Thái Thanh Nhanh</option>
            <option value="Lê Hồng Son">Lê Hồng Son</option>
            <option value="Hồ Trần Ngọc Hạ">Hồ Trần Ngọc Hạ</option>
            <option value="Nguyễn Kim Nhựt">Nguyễn Kim Nhựt</option>
            <option value="Nguyễn Thị Hoàng Trinh">Nguyễn Thị Hoàng Trinh</option>
            <option value="Nguyễn Thành Trung">Nguyễn Thành Trung</option>
            <option value="Lê Thị Như Ý">Lê Thị Như Ý</option>
        </select>

        <div id="checkin-panel">
            <input type="text" id="ghiChu" placeholder="Ghi chú (Đi bù, đổi ca, đi trễ...)">
            <br>
            <button id="start-camera-btn" class="btn-primary">📷 Bật Camera</button>
            <video id="camera-stream" autoplay playsinline></video>
            <canvas id="preview-canvas"></canvas>
            
            <div id="active-camera-controls">
                <button id="switch-camera-btn" class="btn-secondary">🔄 Đổi Cam</button>
                <button id="capture-btn" class="btn-action">📸 Chụp ảnh</button>
            </div>

            <div id="review-controls">
                <button id="retake-btn" class="btn-warning">✖️ Chụp lại</button>
                <button id="submit-btn" class="btn-primary">✅ Gửi Điểm danh</button>
            </div>
        </div>

        <div id="schedule-panel">
            <h3 style="margin-top:0; color:#4CAF50;">Lịch thực tập tuần này</h3>
            <p style="font-size:14px; color:#555;">Tích vào những ngày bạn sẽ lên trường:</p>
            
            <div class="days-grid">
                <label class="day-item"><input type="checkbox" id="d2" value="X"> Thứ 2</label>
                <label class="day-item"><input type="checkbox" id="d3" value="X"> Thứ 3</label>
                <label class="day-item"><input type="checkbox" id="d4" value="X"> Thứ 4</label>
                <label class="day-item"><input type="checkbox" id="d5" value="X"> Thứ 5</label>
                <label class="day-item"><input type="checkbox" id="d6" value="X"> Thứ 6</label>
                <label class="day-item"><input type="checkbox" id="d7" value="X"> Thứ 7</label>
                <label class="day-item" style="grid-column: span 2; justify-content:center;"><input type="checkbox" id="cn" value="X"> Chủ Nhật</label>
            </div>
            
            <button id="save-schedule-btn" class="btn-primary" style="margin-top:20px;">💾 Lưu lịch của tôi</button>
        </div>

        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="loading-text">Đang xử lý...</div>
    </div>

    <script>
        // --- 1. CẤU HÌNH API ---
        // THAY LINK GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyG0woemJu7h_cXbdl0RAbwReeYIMBxw6uB5x73-NnEigBifTXc1jU2G7EZvWUY2G2P/exec'; 
        let currentGoogleEmail = "";

        // --- 2. XỬ LÝ ĐĂNG NHẬP GOOGLE LƯU LOCALSTORAGE ---
        window.onload = function() {
            const savedEmail = localStorage.getItem('student_email');
            if (savedEmail) {
                currentGoogleEmail = savedEmail;
                showMainApp(currentGoogleEmail);
            } else {
                document.getElementById('login-panel').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        };

        function showMainApp(email) {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('user-email').innerText = email;
            document.getElementById('main-app').style.display = 'block';
        }

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);
            currentGoogleEmail = responsePayload.email; 
            localStorage.setItem('student_email', currentGoogleEmail);
            showMainApp(currentGoogleEmail);
        }

        function logoutGoogle() {
            if(confirm("Bạn có chắc chắn muốn đăng xuất tài khoản này?")) {
                localStorage.removeItem('student_email');
                window.location.reload();
            }
        }

        // --- 3. XỬ LÝ CHUYỂN TAB ---
        function switchTab(tabName) {
            if (tabName === 'checkin') {
                document.getElementById('checkin-panel').style.display = 'block';
                document.getElementById('schedule-panel').style.display = 'none';
                document.getElementById('tab-checkin').classList.add('active');
                document.getElementById('tab-schedule').classList.remove('active');
            } else {
                document.getElementById('checkin-panel').style.display = 'none';
                document.getElementById('schedule-panel').style.display = 'block';
                document.getElementById('tab-schedule').classList.add('active');
                document.getElementById('tab-checkin').classList.remove('active');
            }
        }

        // --- 3.5. HÀM TẢI LỊCH VÀ KHÓA Ô CHECKBOX ---
        function loadCurrentSchedule() {
            const hoTen = document.getElementById('hoTen').value;
            // Chỉ chạy nếu đã chọn tên và đang ở Tab Đăng ký lịch
            if (!hoTen || document.getElementById('schedule-panel').style.display === 'none') return; 

            const btnSave = document.getElementById('save-schedule-btn');
            const days = ['d2', 'd3', 'd4', 'd5', 'd6', 'd7', 'cn'];
            
            // Đưa tất cả checkbox về trạng thái mở để chuẩn bị tải dữ liệu mới
            days.forEach(id => {
                const cb = document.getElementById(id);
                cb.checked = false;
                cb.disabled = false;
                cb.parentElement.style.opacity = "1"; // Sáng lên
            });

            btnSave.innerText = "⏳ Đang tải lịch cũ...";
            btnSave.disabled = true;

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "get_schedule", hoTen: hoTen })
            })
            .then(r => r.json()).then(res => {
                btnSave.innerText = "💾 Lưu bổ sung lịch";
                btnSave.disabled = false;
                
                if(res.status === 'success') {
                    const sched = res.schedule; // Nhận mảng 7 ngày từ Server
                    days.forEach((id, index) => {
                        const cb = document.getElementById(id);
                        if (sched[index] === "X") {
                            cb.checked = true;       // Tích sẵn
                            cb.disabled = true;      // Khóa lại không cho bấm
                            cb.parentElement.style.opacity = "0.5"; // Làm mờ đi cho biết là đã chốt
                        }
                    });
                }
            }).catch(() => {
                btnSave.innerText = "💾 Lưu lịch của tôi";
                btnSave.disabled = false;
            });
        }

        // Bắt sự kiện: Cứ hễ đổi tên là tự động tải lịch
        document.getElementById('hoTen').addEventListener('change', loadCurrentSchedule);
        
        // Sửa lại hàm switchTab: Khi bấm sang Tab Lịch thì cũng tự động tải
        function switchTab(tabName) {
            if (tabName === 'checkin') {
                document.getElementById('checkin-panel').style.display = 'block';
                document.getElementById('schedule-panel').style.display = 'none';
                document.getElementById('tab-checkin').classList.add('active');
                document.getElementById('tab-schedule').classList.remove('active');
            } else {
                document.getElementById('checkin-panel').style.display = 'none';
                document.getElementById('schedule-panel').style.display = 'block';
                document.getElementById('tab-schedule').classList.add('active');
                document.getElementById('tab-checkin').classList.remove('active');
                
                // Trì hoãn một chút để đợi giao diện hiển thị xong rồi mới load lịch
                setTimeout(loadCurrentSchedule, 100); 
            }
        }

        // --- 4. XỬ LÝ LƯU LỊCH ---
        document.getElementById('save-schedule-btn').addEventListener('click', function() {
            const hoTen = document.getElementById('hoTen').value;
            if (!hoTen) { alert("Bạn phải chọn Tên của mình trước!"); return; }

            const schedule = [
                document.getElementById('d2').checked ? "X" : "",
                document.getElementById('d3').checked ? "X" : "",
                document.getElementById('d4').checked ? "X" : "",
                document.getElementById('d5').checked ? "X" : "",
                document.getElementById('d6').checked ? "X" : "",
                document.getElementById('d7').checked ? "X" : "",
                document.getElementById('cn').checked ? "X" : ""
            ];

            const btn = this;
            btn.innerText = "⏳ Đang lưu...";
            btn.disabled = true;

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                // Có gửi kèm Email
                body: JSON.stringify({ action: "register_schedule", hoTen: hoTen, schedule: schedule, email: currentGoogleEmail })
            })
            .then(r => r.json()).then(res => {
                btn.innerText = "💾 Lưu lịch của tôi";
                btn.disabled = false;
                if(res.status === 'success') {
                    alert(res.message);
                    document.querySelectorAll('.days-grid input').forEach(cb => cb.checked = false);
                    document.getElementById('hoTen').selectedIndex = 0;
                } else { alert("Lỗi: " + res.message); }
            }).catch(() => {
                alert("Lỗi mạng!"); btn.innerText = "💾 Lưu lịch của tôi"; btn.disabled = false;
            });
        });

        // --- 5. XỬ LÝ CAMERA & ĐIỂM DANH ---
        const video = document.getElementById('camera-stream');
        const canvas = document.getElementById('preview-canvas');
        const startCameraBtn = document.getElementById('start-camera-btn');
        const activeCameraControls = document.getElementById('active-camera-controls');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const captureBtn = document.getElementById('capture-btn');
        const reviewControls = document.getElementById('review-controls');
        const retakeBtn = document.getElementById('retake-btn');
        const submitBtn = document.getElementById('submit-btn');
        const hoTenSelect = document.getElementById('hoTen');
        const ghiChuInput = document.getElementById('ghiChu');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const loadingText = document.getElementById('loading-text');

        let currentImageData = null;
        let currentStream = null;
        let useFrontCamera = false;

        function initCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
            const constraints = { video: { facingMode: (useFrontCamera ? "user" : "environment") }, audio: false };
            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    currentStream = stream;
                    video.style.display = 'block'; 
                    video.srcObject = stream;
                    startCameraBtn.style.display = 'none';
                    activeCameraControls.style.display = 'block';
                    video.onloadedmetadata = () => { video.play(); };
                })
                .catch(err => alert("Lỗi camera: " + err));
        }

        startCameraBtn.addEventListener('click', initCamera);
        switchCameraBtn.addEventListener('click', () => { useFrontCamera = !useFrontCamera; initCamera(); });

        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            if(useFrontCamera) {
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            currentImageData = canvas.toDataURL('image/jpeg', 0.8);
            video.style.display = 'none'; activeCameraControls.style.display = 'none';
            canvas.style.display = 'block'; reviewControls.style.display = 'block';
        });

        retakeBtn.addEventListener('click', () => {
            currentImageData = null; canvas.style.display = 'none';
            reviewControls.style.display = 'none'; video.style.display = 'block';
            activeCameraControls.style.display = 'block';
        });

        function runProgressBar() {
            progressContainer.style.display = 'block';
            loadingText.style.display = 'block';
            loadingText.innerText = "Đang xử lý...";
            progressBar.style.width = '10%';
            let progress = 10;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 85) { progress = 85; clearInterval(interval); }
                progressBar.style.width = progress + '%';
            }, 500);
            return interval;
        }

        function resetButtons() {
            progressContainer.style.display = 'none';
            loadingText.style.display = 'none';
            submitBtn.disabled = false; retakeBtn.disabled = false;
        }

        submitBtn.addEventListener('click', () => {
            const hoTen = hoTenSelect.value;
            if (!hoTen) { alert("Vui lòng chọn tên!"); return; }
            
            submitBtn.disabled = true; retakeBtn.disabled = true;
            progressContainer.style.display = 'block';
            loadingText.style.display = 'block';
            loadingText.innerText = "📍 Đang kiểm tra vị trí...";
            progressBar.style.width = '5%';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLng = position.coords.longitude;
                        sendDataToServer(hoTen, userLat, userLng);
                    },
                    (error) => {
                        alert("Lỗi Định vị: Bật GPS trên máy và cấp quyền cho web để điểm danh!");
                        resetButtons();
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            } else {
                alert("Không hỗ trợ GPS."); resetButtons();
            }
        });

        function sendDataToServer(hoTen, lat, lng) {
            const ghiChu = ghiChuInput.value.trim();
            const progressInterval = runProgressBar();

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                // Gửi đầy đủ thông tin (Kèm Email)
                body: JSON.stringify({ action: "check_in", hoTen: hoTen, image: currentImageData, lat: lat, lng: lng, ghiChu: ghiChu, email: currentGoogleEmail })
            })
            .then(r => r.json()).then(res => {
                clearInterval(progressInterval);
                progressBar.style.width = '100%'; 
                loadingText.innerText = res.status === 'success' ? "Hoàn tất!" : "Lỗi!";
                
                setTimeout(() => {
                    resetButtons();
                    progressBar.style.width = '0%';
                    if(res.status === 'success') {
                        alert(res.message);
                        hoTenSelect.selectedIndex = 0;
                        ghiChuInput.value = '';
                        retakeBtn.click();
                    } else { alert(res.message); }
                }, 500); 
            }).catch(() => { 
                alert('Lỗi kết nối mạng!'); 
                clearInterval(progressInterval); resetButtons();
            });
        }
    </script>
</body>
</html>
